
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mariage d'Antonin & Marie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Antonin & Marie</h1>
    <p>Se marient ! 💍</p>
    <p>12 Juin 2027</p>
</header>

<section>
    <h2>Notre histoire</h2>
    <p>Tout a commencé en 2020... ❤️</p>
</section>

<section>
    <h2>Informations</h2>
    <p>📍 Lieu : Château de Paris</p>
    <p>⏰ Heure : 15h00</p>
</section>

<section>
    <h2>Confirmez votre présence</h2>
    <form id="rsvpForm">
        <input type="text" placeholder="Votre nom" required>
        <select required>
            <option value="">Présence ?</option>
            <option>Oui</option>
            <option>Non</option>
        </select>
        <button type="submit">Envoyer</button>
    </form>
    <p id="message"></p>
</section>

<footer>
    <p>On a hâte de vous voir ❤️</p>
</footer>

<script src="script.js"></script>
</body>
</html>
